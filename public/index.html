<!DOCTYPE html>
<html>
<head>
  <title>Team Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Team Task Manager</h1>

<div class="container">

  <!-- AUTH UI -->
  <div id="loginBox" class="auth-container">

    <!-- SIGNUP -->
    <div class="card" id="signupCard">
      <h3>Create Account</h3>

      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">

      <button onclick="signup()">Sign Up</button>

      <p>Already have account? 
        <span onclick="showLogin()">Login</span>
      </p>
    </div>

    <!-- LOGIN -->
    <div class="card" id="loginCard" style="display:none;">
      <h3>Login</h3>

      <input id="loginEmail" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Password">

      <button onclick="login()">Login</button>

      <p>Don't have account? 
        <span onclick="showSignup()">Signup</span>
      </p>
    </div>

  </div>

  <!-- MAIN APP -->
  <div id="app" style="display:none;">

    <div class="card">
      <h3>Welcome <span id="userName"></span></h3>
      <button onclick="loadDashboard()">Load Dashboard</button>
      <div id="dashboard"></div>
    </div>

    <div class="card">
      <h3>Create Project</h3>
      <input id="projectName" placeholder="Project name">
      <button onclick="createProject()">Create Project</button>
    </div>

    <div class="card">
      <h3>Create Task</h3>
      <input id="title" placeholder="Task Title">
      <input id="assignedTo" placeholder="Assign Email">
      <select id="projectSelect"></select>
      <button onclick="createTask()">Create Task</button>
    </div>

    <div class="card">
      <h3>All Tasks</h3>
      <button onclick="loadTasks()">Load Tasks</button>
      <div id="taskList"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
